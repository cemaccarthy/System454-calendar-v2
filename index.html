<!DOCTYPE html>
<html lang="en-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>symmetry454</title>
    <style>
        :root {
            --black: #000000;
            --red: #be1e2d;
            --yellow: #ffde17;
            --white: #ffffff;
            --blue: #21409a;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--black);
            color: var(--white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-around;
            padding: calc(10px + var(--safe-top)) 10px 10px;
            background: var(--blue);
            border-bottom: 2px solid var(--yellow);
            z-index: 10;
        }

        .nav-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-btn.active {
            color: var(--yellow);
            border-bottom: 2px solid var(--yellow);
        }

        /* --- Main Container --- */
        main {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding-bottom: var(--safe-bottom);
        }

        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }

        /* --- Calendar Page --- */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--black);
        }

        .cal-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--white);
            text-align: center;
        }

        .cal-nav {
            background: var(--blue);
            border: 1px solid var(--white);
            color: var(--white);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .weekday-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.75rem;
            color: var(--yellow);
            padding: 5px 0;
            font-weight: 700;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: minmax(60px, 1fr);
            gap: 2px;
            padding: 2px;
            flex: 1;
        }

        .day-cell {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 4px;
            cursor: pointer;
            position: relative;
            transition: background 0.15s;
        }

        .day-cell.empty { background: transparent; border: none; pointer-events: none; }
        .day-cell.selected { background: var(--blue); border-color: var(--yellow); }
        .day-cell.today { border: 2px solid var(--red); }

        .day-num { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
        
        .moon-icon { font-size: 0.7rem; opacity: 0.8; margin-bottom: 2px; }
        
        .event-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 90%; }
        .dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot.event { background: var(--white); }
        .dot.holiday { background: var(--red); }

        /* --- Mark Day Button --- */
        .mark-btn-container {
            padding: 15px;
            background: var(--black);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .mark-btn {
            width: 100%;
            padding: 16px;
            background: var(--red);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .mark-btn:disabled { background: #333; color: #666; }

        /* --- Converter Page --- */
        .converter-content {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .conv-group label {
            display: block;
            color: var(--yellow);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .conv-input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--blue);
            border-radius: 8px;
            color: var(--white);
            font-size: 1.1rem;
            outline: none;
        }
        .conv-input:focus { border-color: var(--yellow); }

        .conv-result {
            background: var(--blue);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 10px;
        }
        .conv-result h3 { margin: 0 0 5px; color: var(--yellow); font-size: 0.9rem; text-transform: uppercase;}
        .conv-result p { margin: 0; font-size: 1.3rem; font-weight: 700; }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--black);
            border: 2px solid var(--yellow);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 350px;
        }

        .modal h2 { margin: 0 0 20px; color: var(--yellow); text-align: center; }

        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn {
            flex: 1; padding: 12px; border: 1px solid var(--white);
            background: transparent; color: var(--white); border-radius: 8px;
            font-weight: 700; cursor: pointer;
        }
        .type-btn.active[data-type="event"] { background: var(--white); color: var(--black); }
        .type-btn.active[data-type="holiday"] { background: var(--red); border-color: var(--red); }

        .modal input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 20px;
            background: rgba(255,255,255,0.1); border: 1px solid var(--blue);
            border-radius: 8px; color: var(--white); font-size: 1rem; outline: none;
        }

        .modal-actions { display: flex; gap: 10px; }
        .btn-save { flex: 1; padding: 14px; background: var(--blue); color: var(--white); border: none; border-radius: 8px; font-weight: 700; font-size: 1rem;}
        .btn-cancel { flex: 1; padding: 14px; background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; font-weight: 700; font-size: 1rem;}

    </style>
</head>
<body>

<nav>
    <button class="nav-btn active" data-page="calendar">Calendar</button>
    <button class="nav-btn" data-page="converter">Converter</button>
</nav>

<main>
    <!-- CALENDAR PAGE -->
    <div id="page-calendar" class="page active">
        <div class="cal-header">
            <button class="cal-nav" id="prev-month">‹</button>
            <div class="cal-title" id="cal-title">July 2026</div>
            <button class="cal-nav" id="next-month">›</button>
        </div>
        <div class="weekday-row">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
        </div>
        <div class="days-grid" id="days-grid"></div>
        <div class="mark-btn-container">
            <button class="mark-btn" id="mark-day-btn" disabled>Mark Day</button>
        </div>
    </div>

    <!-- CONVERTER PAGE -->
    <div id="page-converter" class="page">
        <div class="converter-content">
            <div class="conv-group">
                <label>Gregorian Date</label>
                <input type="date" class="conv-input" id="greg-input">
            </div>
            <div class="conv-result">
                <h3>Symmetry454 Equivalent</h3>
                <p id="sym-result">—</p>
            </div>
            
            <div style="height:1px; background:rgba(255,255,255,0.1); margin:10px 0;"></div>

            <div class="conv-group">
                <label>Symmetry454 Date (YYYY-MM-DD)</label>
                <input type="text" class="conv-input" id="sym-input" placeholder="e.g. 2026-07-15">
            </div>
            <div class="conv-result">
                <h3>Gregorian Equivalent</h3>
                <p id="greg-result">—</p>
            </div>
        </div>
    </div>
</main>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="event-modal">
    <div class="modal">
        <h2>Add Entry</h2>
        <div class="type-selector">
            <button class="type-btn active" data-type="event">Event</button>
            <button class="type-btn" data-type="holiday">Holiday</button>
        </div>
        <input type="text" id="event-name" placeholder="Enter name..." autocomplete="off">
        <div class="modal-actions">
            <button class="btn-cancel" id="modal-cancel">Cancel</button>
            <button class="btn-save" id="modal-save">Save</button>
        </div>
    </div>
</div>

<script>
/**
 * SYMMETRY454 CALENDAR ENGINE
 * 
 * Core Principle: The Symmetry454 calendar is a perennial calendar where every year
 * begins on a Monday. Months alternate between 4-week and 5-week patterns.
 * Quarter structure: 4 weeks + 5 weeks + 4 weeks = 13 weeks.
 * Leap Year Rule: 52-week years have 364 days. Leap years add a 53rd week (Leap Week)
 * at the end of December. Leap year if (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0.
 * 
 * ANCHOR: July 15, 2026 (Gregorian) = July 15, 2026 (Symmetry454) [Monday]
 */

const S454 = (() => {
    // Days from Symmetry454 Epoch (Year 1, Month 1, Day 1 = Monday) to Anchor
    // We calculate anchor offset dynamically based on known anchor
    const ANCHOR_GREG = new Date(2026, 6, 15); // July 15, 2026 (Month is 0-indexed)
    const ANCHOR_S454 = { year: 2026, month: 7, day: 15 };
    
    function isLeap(year) {
        return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
    }

    function getWeeksInMonth(year, month) {
        // Pattern per quarter: 4, 5, 4
        const pattern = [4, 5, 4];
        const qIndex = ((month - 1) % 3);
        let weeks = pattern[qIndex];
        // Leap week added to December (month 12) in leap years
        if (month === 12 && isLeap(year)) weeks += 1;
        return weeks;
    }

    function getDaysInMonth(year, month) {
        return getWeeksInMonth(year, month) * 7;
    }

    function getDaysInYear(year) {
        return isLeap(year) ? 371 : 364;
    }

    // Convert S454 date to total days since S454 epoch
    function s454ToDayCount(y, m, d) {
        let days = 0;
        // Years
        for (let yr = 1; yr < y; yr++) days += getDaysInYear(yr);
        // Months
        for (let mo = 1; mo < m; mo++) days += getDaysInMonth(y, mo);
        // Days
        days += d - 1;
        return days;
    }

    // Convert Gregorian to total days since Unix-like epoch for diffing
    function gregToDayCount(date) {
        const start = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const epoch = new Date(Date.UTC(1, 0, 1));
        return Math.floor((start - epoch) / 86400000);
    }

    // Calculate offset between S454 day count and Gregorian day count using anchor
    const anchorSDays = s454ToDayCount(ANCHOR_S454.year, ANCHOR_S454.month, ANCHOR_S454.day);
    const anchorGDays = gregToDayCount(ANCHOR_GREG);
    const OFFSET = anchorGDays - anchorSDays;

    function s454ToGregorian(y, m, d) {
        const sDays = s454ToDayCount(y, m, d);
        const gDays = sDays + OFFSET;
        const epoch = new Date(Date.UTC(1, 0, 1));
        const result = new Date(epoch.getTime() + gDays * 86400000);
        return { year: result.getUTCFullYear(), month: result.getUTCMonth() + 1, day: result.getUTCDate() };
    }

    function gregorianToS454(gYear, gMonth, gDay) {
        const gDate = new Date(Date.UTC(gYear, gMonth - 1, gDay));
        const gDays = gregToDayCount(gDate);
        const sDays = gDays - OFFSET;
        
        // Reverse lookup
        let y = 1, remaining = sDays;
        while (true) {
            const dy = getDaysInYear(y);
            if (remaining < dy) break;
            remaining -= dy;
            y++;
        }
        let m = 1;
        while (true) {
            const dm = getDaysInMonth(y, m);
            if (remaining < dm) break;
            remaining -= dm;
            m++;
        }
        return { year: y, month: m, day: remaining + 1 };
    }

    // Get day of week (0=Sun, 1=Mon ... 6=Sat) for S454 date
    // In S454, day 1 of year 1 is Monday. So dayCount % 7 gives offset from Monday.
    function getDayOfWeek(y, m, d) {
        const totalDays = s454ToDayCount(y, m, d);
        // Day 0 = Monday in our count. JS: 0=Sun, 1=Mon
        const dow = ((totalDays % 7) + 1) % 7; // Shift so Mon=1, Sun=0
        return dow;
    }

    // Moon phase calculation (based on Gregorian equivalent)
    function getMoonPhase(y, m, d) {
        const g = s454ToGregorian(y, m, d);
        const date = new Date(Date.UTC(g.year, g.month - 1, g.day));
        // Known new moon: Jan 6, 2000
        const knownNew = new Date(Date.UTC(2000, 0, 6));
        const diff = (date - knownNew) / 86400000;
        const cycle = 29.53059;
        const phase = ((diff % cycle) + cycle) % cycle;
        const fraction = phase / cycle;
        
        if (fraction < 0.0625) return '🌑';
        if (fraction < 0.1875) return '🌒';
        if (fraction < 0.3125) return '🌓';
        if (fraction < 0.4375) return '🌔';
        if (fraction < 0.5625) return '🌕';
        if (fraction < 0.6875) return '🌖';
        if (fraction < 0.8125) return '🌗';
        if (fraction < 0.9375) return '🌘';
        return '🌑';
    }

    return {
        getWeeksInMonth, getDaysInMonth, getDayOfWeek,
        s454ToGregorian, gregorianToS454, getMoonPhase, isLeap
    };
})();

/**
 * VANCOUVER CIVIL HOLIDAYS
 * Auto-populated for current and future years
 */
function getVancouverHolidays(s454Year) {
    const holidays = [];
    const gYear = s454Year; // Approximate mapping
    
    const fixedHolidays = [
        { name: "New Year's Day", gMonth: 1, gDay: 1 },
        { name: "Canada Day", gMonth: 7, gDay: 1 },
        { name: "BC Day", gMonth: 8, gDay: null }, // First Monday of August
        { name: "Labour Day", gMonth: 9, gDay: null }, // First Monday of September
        { name: "Truth & Reconciliation", gMonth: 9, gDay: 30 },
        { name: "Thanksgiving", gMonth: 10, gDay: null }, // Second Monday of October
        { name: "Remembrance Day", gMonth: 11, gDay: 11 },
        { name: "Christmas Day", gMonth: 12, gDay: 25 },
        { name: "Boxing Day", gMonth: 12, gDay: 26 }
    ];

    // Victoria Day: Last Monday before May 25
    const may25 = new Date(gYear, 4, 25);
    const vdOffset = (may25.getDay() + 6) % 7;
    const victoriaDay = new Date(gYear, 4, 25 - vdOffset);

    // Good Friday: Simplified approximation (can vary ±1 day)
    // Using Meeus/Jones/Butcher algorithm for Easter
    const a = gYear % 19;
    const b = Math.floor(gYear / 100);
    const c = gYear % 100;
    const d = Math.floor(b / 4);
    const e = b % 4;
    const f = Math.floor((b + 8) / 25);
    const g = Math.floor((b - f + 1) / 3);
    const h = (19 * a + b - d - g + 15) % 30;
    const i = Math.floor(c / 4);
    const k = c % 4;
    const l = (32 + 2 * e + 2 * i - h - k) % 7;
    const m = Math.floor((a + 11 * h + 22 * l) / 451);
    const easterMonth = Math.floor((h + l - 7 * m + 114) / 31);
    const easterDay = ((h + l - 7 * m + 114) % 31) + 1;
    const goodFriday = new Date(gYear, easterMonth - 1, easterDay - 2);

    const dynamicHolidays = [
        { name: "Good Friday", date: goodFriday },
        { name: "Victoria Day", date: victoriaDay },
        { name: "BC Day", date: nthMonday(gYear, 8, 1) },
        { name: "Labour Day", date: nthMonday(gYear, 9, 1) },
        { name: "Thanksgiving", date: nthMonday(gYear, 10, 2) }
    ];

    function nthMonday(year, month, n) {
        const first = new Date(year, month - 1, 1);
        const firstMon = ((8 - first.getDay()) % 7) + 1;
        return new Date(year, month - 1, firstMon + (n - 1) * 7);
    }

    [...fixedHolidays.filter(h => h.gDay !== null), ...dynamicHolidays].forEach(h => {
        const gDate = h.date || new Date(gYear, h.gMonth - 1, h.gDay);
        const s = S454.gregorianToS454(gDate.getFullYear(), gDate.getMonth() + 1, gDate.getDate());
        if (s.year === s454Year) {
            holidays.push({ month: s.month, day: s.day, name: h.name });
        }
    });

    return holidays;
}

/**
 * APP STATE & LOGIC
 */
const state = {
    viewYear: 2026,
    viewMonth: 7,
    selectedDay: null,
    events: JSON.parse(localStorage.getItem('sym454_events') || '{}'),
    modalType: 'event'
};

// DOM Elements
const els = {
    grid: document.getElementById('days-grid'),
    title: document.getElementById('cal-title'),
    markBtn: document.getElementById('mark-day-btn'),
    modal: document.getElementById('event-modal'),
    eventName: document.getElementById('event-name'),
    typeBtns: document.querySelectorAll('.type-btn'),
    navBtns: document.querySelectorAll('.nav-btn'),
    pages: document.querySelectorAll('.page'),
    gregInput: document.getElementById('greg-input'),
    symResult: document.getElementById('sym-result'),
    symInput: document.getElementById('sym-input'),
    gregResult: document.getElementById('greg-result')
};

const MONTH_NAMES = ["", "January", "February", "March", "April", "May", "June", 
                     "July", "August", "September", "October", "November", "December"];

function saveEvents() {
    localStorage.setItem('sym454_events', JSON.stringify(state.events));
}

function getKey(y, m, d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function renderCalendar() {
    els.title.textContent = `${MONTH_NAMES[state.viewMonth]} ${state.viewYear}`;
    els.grid.innerHTML = '';
    
    const firstDow = S454.getDayOfWeek(state.viewYear, state.viewMonth, 1);
    const daysInMonth = S454.getDaysInMonth(state.viewYear, state.viewMonth);
    const holidays = getVancouverHolidays(state.viewYear);
    
    // Empty cells before first day
    for (let i = 0; i < firstDow; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell empty';
        els.grid.appendChild(empty);
    }

    // Day cells
    for (let d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.dataset.day = d;
        
        // Today highlight
        if (state.viewYear === 2026 && state.viewMonth === 7 && d === 15) {
            cell.classList.add('today');
        }
        
        // Selected highlight
        if (state.selectedDay === d) cell.classList.add('selected');

        // Day number
        const num = document.createElement('div');
        num.className = 'day-num';
        num.textContent = d;
        cell.appendChild(num);

        // Moon phase
        const moon = document.createElement('div');
        moon.className = 'moon-icon';
        moon.textContent = S454.getMoonPhase(state.viewYear, state.viewMonth, d);
        cell.appendChild(moon);

        // Event dots
        const key = getKey(state.viewYear, state.viewMonth, d);
        const dayEvents = state.events[key] || [];
        const hol = holidays.filter(h => h.day === d);
        
        if (dayEvents.length > 0 || hol.length > 0) {
            const dots = document.createElement('div');
            dots.className = 'event-dots';
            hol.forEach(() => {
                const dot = document.createElement('div');
                dot.className = 'dot holiday';
                dots.appendChild(dot);
            });
            dayEvents.forEach(e => {
                const dot = document.createElement('div');
                dot.className = `dot ${e.type}`;
                dots.appendChild(dot);
            });
            cell.appendChild(dots);
        }

        cell.addEventListener('click', () => selectDay(d));
        els.grid.appendChild(cell);
    }
}

function selectDay(d) {
    state.selectedDay = d;
    renderCalendar();
    els.markBtn.disabled = false;
}

// Navigation
document.getElementById('prev-month').addEventListener('click', () => {
    state.viewMonth--;
    if (state.viewMonth < 1) { state.viewMonth = 12; state.viewYear--; }
    state.selectedDay = null;
    els.markBtn.disabled = true;
    renderCalendar();
});

document.getElementById('next-month').addEventListener('click', () => {
    state.viewMonth++;
    if (state.viewMonth > 12) { state.viewMonth = 1; state.viewYear++; }
    state.selectedDay = null;
    els.markBtn.disabled = true;
    renderCalendar();
});

// Tab Navigation
els.navBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        els.navBtns.forEach(b => b.classList.remove('active'));
        els.pages.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
    });
});

// Modal Logic
els.markBtn.addEventListener('click', () => {
    els.modal.classList.add('open');
    els.eventName.value = '';
    els.eventName.focus();
});

document.getElementById('modal-cancel').addEventListener('click', () => {
    els.modal.classList.remove('open');
});

els.typeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        els.typeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.modalType = btn.dataset.type;
    });
});

document.getElementById('modal-save').addEventListener('click', () => {
    const name = els.eventName.value.trim();
    if (!name) return;
    
    const key = getKey(state.viewYear, state.viewMonth, state.selectedDay);
    if (!state.events[key]) state.events[key] = [];
    state.events[key].push({ type: state.modalType, name });
    saveEvents();
    
    els.modal.classList.remove('open');
    renderCalendar();
});

// Converter Logic
els.gregInput.addEventListener('change', () => {
    const val = els.gregInput.value;
    if (!val) return;
    const [y, m, d] = val.split('-').map(Number);
    const s = S454.gregorianToS454(y, m, d);
    els.symResult.textContent = `${MONTH_NAMES[s.month]} ${s.day}, ${s.year}`;
});

els.symInput.addEventListener('input', () => {
    const val = els.symInput.value.trim();
    const match = val.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (!match) { els.gregResult.textContent = '—'; return; }
    
    const [, y, m, d] = match.map(Number);
    try {
        const g = S454.s454ToGregorian(y, m, d);
        els.gregResult.textContent = `${g.year}-${String(g.month).padStart(2,'0')}-${String(g.day).padStart(2,'0')}`;
    } catch {
        els.gregResult.textContent = 'Invalid Date';
    }
});

// Initialize with today set as default
els.gregInput.valueAsDate = new Date();
els.gregInput.dispatchEvent(new Event('change'));
renderCalendar();

</script>
