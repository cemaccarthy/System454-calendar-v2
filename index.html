<!DOCTYPE html>
<html lang="en-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <title>symmetry454</title>
    
    <!-- Bauhaus-inspired geometric sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
            --red: #be1e2d;
            --yellow: #ffde17;
            --blue: #21409a;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--white);
            color: var(--black);
            font-family: 'Josefin Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- Navigation (Minimal Infill) --- */
        nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: calc(15px + var(--safe-top)) 20px 15px;
            border-bottom: 2px solid var(--black);
            background: var(--white);
            z-index: 10;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--black);
            font-family: 'Josefin Sans', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 5px 0;
            cursor: pointer;
            position: relative;
        }

        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--blue);
        }

        /* --- Main Container --- */
        main { flex: 1; position: relative; overflow-y: auto; }
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }

        /* --- Calendar Header --- */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--black);
        }

        .cal-title {
            font-size: 1.8rem;
            font-weight: 300; /* Not bold as requested */
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .cal-nav {
            background: none;
            border: 1px solid var(--black);
            color: var(--black);
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: 'Josefin Sans', sans-serif;
        }
        .cal-nav:active { background: var(--yellow); }

        /* --- EXCEL STYLE GRID --- */
        .weekday-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-bottom: 2px solid var(--black);
            background: var(--white);
        }

        .weekday-cell {
            padding: 10px 0;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-right: 1px solid var(--black);
        }
        .weekday-cell:last-child { border-right: none; }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            /* Unified borders: only right and bottom on cells, container handles outer */
            border-right: 1px solid var(--black);
            border-bottom: 1px solid var(--black);
            flex: 1;
        }

        .day-cell {
            border-left: 1px solid var(--black);
            border-top: 1px solid var(--black);
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            cursor: pointer;
            min-height: 70px;
            background: var(--white);
            transition: background 0.1s;
        }

        .day-cell.empty { background: var(--white); cursor: default; }
        
        /* Selection: Blue outline, no fill */
        .day-cell.selected { 
            outline: 3px solid var(--blue); 
            outline-offset: -3px; 
            z-index: 2;
        }

        /* Today: Red accent corner or subtle indicator */
        .day-cell.today .day-num { color: var(--red); font-weight: 600; }

        .day-num { 
            font-size: 0.9rem; 
            line-height: 1; 
            margin-bottom: 4px;
        }

        /* Events as text inside the box */
        .event-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            width: 100%;
            overflow: hidden;
        }

        .event-text {
            font-size: 0.6rem;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 1px 3px;
            border-radius: 2px;
        }

        .event-text.event { color: var(--blue); }
        .event-text.holiday { color: var(--red); font-weight: 600; }

        /* --- Mark Day Button (Minimal Infill) --- */
        .mark-btn-container {
            padding: 15px 20px calc(15px + var(--safe-bottom));
            border-top: 1px solid var(--black);
            background: var(--white);
            display: flex;
            justify-content: center;
            min-height: 70px; /* Reserve space even when hidden */
        }

        .mark-btn {
            background: none;
            border: 1px solid var(--black);
            color: var(--black);
            padding: 12px 40px;
            font-family: 'Josefin Sans', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }
        .mark-btn:active { background: var(--yellow); }
        .mark-btn.hidden { visibility: hidden; pointer-events: none; }

        /* --- Converter Page --- */
        .converter-content { padding: 30px 20px; display: flex; flex-direction: column; gap: 30px; }
        
        .conv-group label {
            display: block; font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px; color: var(--black);
        }
        
        .conv-input {
            width: 100%; padding: 12px; background: var(--white);
            border: 1px solid var(--black); font-family: 'Josefin Sans', sans-serif;
            font-size: 1rem; color: var(--black); outline: none;
        }
        .conv-input:focus { border-color: var(--blue); }

        .conv-result {
            border: 1px solid var(--black); padding: 20px; text-align: center;
        }
        .conv-result h3 { margin: 0 0 5px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--blue); }
        .conv-result p { margin: 0; font-size: 1.2rem; font-weight: 400; }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 100; padding: 20px;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--white); border: 2px solid var(--black);
            padding: 30px; width: 100%; max-width: 320px;
        }
        .modal h2 { margin: 0 0 25px; font-weight: 300; text-transform: uppercase; letter-spacing: 2px; text-align: center; }

        .type-selector { display: flex; gap: 0; margin-bottom: 25px; border: 1px solid var(--black); }
        .type-btn {
            flex: 1; padding: 12px; border: none; background: var(--white);
            color: var(--black); font-family: 'Josefin Sans', sans-serif;
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; cursor: pointer;
        }
        .type-btn:first-child { border-right: 1px solid var(--black); }
        .type-btn.active[data-type="event"] { background: var(--blue); color: var(--white); }
        .type-btn.active[data-type="holiday"] { background: var(--red); color: var(--white); }

        .modal input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 25px;
            border: 1px solid var(--black); background: var(--white);
            font-family: 'Josefin Sans', sans-serif; font-size: 1rem; outline: none;
        }

        .modal-actions { display: flex; gap: 0; border: 1px solid var(--black); }
        .btn-save, .btn-cancel {
            flex: 1; padding: 14px; border: none; background: var(--white);
            font-family: 'Josefin Sans', sans-serif; text-transform: uppercase;
            letter-spacing: 1px; font-size: 0.8rem; cursor: pointer;
        }
        .btn-save { border-left: 1px solid var(--black); }
        .btn-save:active { background: var(--yellow); }
        .btn-cancel:active { background: #eee; }

    </style>
</head>
<body>

<nav>
    <button class="nav-btn active" data-page="calendar">Calendar</button>
    <button class="nav-btn" data-page="converter">Converter</button>
</nav>

<main>
    <!-- CALENDAR PAGE -->
    <div id="page-calendar" class="page active">
        <div class="cal-header">
            <button class="cal-nav" id="prev-month">←</button>
            <div class="cal-title" id="cal-title">July 2026</div>
            <button class="cal-nav" id="next-month">→</button>
        </div>
        
        <!-- MONDAY START WEEK -->
        <div class="weekday-row">
            <div class="weekday-cell">Mon</div>
            <div class="weekday-cell">Tue</div>
            <div class="weekday-cell">Wed</div>
            <div class="weekday-cell">Thu</div>
            <div class="weekday-cell">Fri</div>
            <div class="weekday-cell">Sat</div>
            <div class="weekday-cell">Sun</div>
        </div>

        <div class="days-grid" id="days-grid"></div>
        
        <div class="mark-btn-container">
            <button class="mark-btn hidden" id="mark-day-btn">Mark Day</button>
        </div>
    </div>

    <!-- CONVERTER PAGE -->
    <div id="page-converter" class="page">
        <div class="converter-content">
            <div class="conv-group">
                <label>Gregorian Date</label>
                <input type="date" class="conv-input" id="greg-input">
            </div>
            <div class="conv-result">
                <h3>Symmetry454</h3>
                <p id="sym-result">—</p>
            </div>
            <div class="conv-group">
                <label>Symmetry454 (YYYY-MM-DD)</label>
                <input type="text" class="conv-input" id="sym-input" placeholder="2026-07-15">
            </div>
            <div class="conv-result">
                <h3>Gregorian</h3>
                <p id="greg-result">—</p>
            </div>
        </div>
    </div>
</main>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="event-modal">
    <div class="modal">
        <h2>Add Entry</h2>
        <div class="type-selector">
            <button class="type-btn active" data-type="event">Event</button>
            <button class="type-btn" data-type="holiday">Holiday</button>
        </div>
        <input type="text" id="event-name" placeholder="Name..." autocomplete="off">
        <div class="modal-actions">
            <button class="btn-cancel" id="modal-cancel">Cancel</button>
            <button class="btn-save" id="modal-save">Save</button>
        </div>
    </div>
</div>

<script>
/**
 * SYMMETRY454 ENGINE (Unchanged Logic, Updated Integration)
 */
const S454 = (() => {
    const ANCHOR_GREG = new Date(2026, 6, 15);
    const ANCHOR_S454 = { year: 2026, month: 7, day: 15 };
    
    function isLeap(year) { return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0); }
    function getWeeksInMonth(year, month) {
        const pattern = [4, 5, 4];
        let weeks = pattern[((month - 1) % 3)];
        if (month === 12 && isLeap(year)) weeks += 1;
        return weeks;
    }
    function getDaysInMonth(year, month) { return getWeeksInMonth(year, month) * 7; }
    function getDaysInYear(year) { return isLeap(year) ? 371 : 364; }
    
    function s454ToDayCount(y, m, d) {
        let days = 0;
        for (let yr = 1; yr < y; yr++) days += getDaysInYear(yr);
        for (let mo = 1; mo < m; mo++) days += getDaysInMonth(y, mo);
        return days + d - 1;
    }
    
    function gregToDayCount(date) {
        const start = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const epoch = new Date(Date.UTC(1, 0, 1));
        return Math.floor((start - epoch) / 86400000);
    }
    
    const anchorSDays = s454ToDayCount(ANCHOR_S454.year, ANCHOR_S454.month, ANCHOR_S454.day);
    const anchorGDays = gregToDayCount(ANCHOR_GREG);
    const OFFSET = anchorGDays - anchorSDays;

    function s454ToGregorian(y, m, d) {
        const gDays = s454ToDayCount(y, m, d) + OFFSET;
        const epoch = new Date(Date.UTC(1, 0, 1));
        const result = new Date(epoch.getTime() + gDays * 86400000);
        return { year: result.getUTCFullYear(), month: result.getUTCMonth() + 1, day: result.getUTCDate() };
    }

    function gregorianToS454(gYear, gMonth, gDay) {
        const gDate = new Date(Date.UTC(gYear, gMonth - 1, gDay));
        const sDays = gregToDayCount(gDate) - OFFSET;
        let y = 1, remaining = sDays;
        while (true) { const dy = getDaysInYear(y); if (remaining < dy) break; remaining -= dy; y++; }
        let m = 1;
        while (true) { const dm = getDaysInMonth(y, m); if (remaining < dm) break; remaining -= dm; m++; }
        return { year: y, month: m, day: remaining + 1 };
    }

    // MONDAY = 0 in our internal count, mapped to JS Mon=1..Sun=0
    function getDayOfWeek(y, m, d) {
        const totalDays = s454ToDayCount(y, m, d);
        // S454 day 0 = Monday. We need Mon=0, Tue=1... Sun=6 for grid offset
        return totalDays % 7; 
    }

    return { getDaysInMonth, getDayOfWeek, s454ToGregorian, gregorianToS454, isLeap };
})();

/** VANCOUVER HOLIDAYS */
function getVancouverHolidays(s454Year) {
    const holidays = [];
    const gYear = s454Year;
    
    function nthMonday(year, month, n) {
        const first = new Date(year, month - 1, 1);
        const firstMon = ((8 - first.getDay()) % 7) + 1;
        return new Date(year, month - 1, firstMon + (n - 1) * 7);
    }

    // Easter algorithm
    const a=gYear%19, b=Math.floor(gYear/100), c=gYear%100, d=Math.floor(b/4), e=b%4;
    const f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3);
    const h=(19*a+b-d-g+15)%30, i=Math.floor(c/4), k=c%4;
    const l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451);
    const easterMonth=Math.floor((h+l-7*m+114)/31);
    const easterDay=((h+l-7*m+114)%31)+1;
    const goodFriday=new Date(gYear,easterMonth-1,easterDay-2);

    const may25=new Date(gYear,4,25);
    const victoriaDay=new Date(gYear,4,25-((may25.getDay()+6)%7));

    const dynamic=[
        {name:"Good Friday",date:goodFriday},
        {name:"Victoria Day",date:victoriaDay},
        {name:"BC Day",date:nthMonday(gYear,8,1)},
        {name:"Labour Day",date:nthMonday(gYear,9,1)},
        {name:"Thanksgiving",date:nthMonday(gYear,10,2)}
    ];
    const fixed=[
        {name:"New Year's Day",m:1,d:1},{name:"Canada Day",m:7,d:1},
        {name:"Truth & Reconciliation",m:9,d:30},{name:"Remembrance Day",m:11,d:11},
        {name:"Christmas Day",m:12,d:25},{name:"Boxing Day",m:12,d:26}
    ];

    [...fixed.map(f=>({name:f.name,date:new Date(gYear,f.m-1,f.d)})),...dynamic].forEach(h=>{
        const s=S454.gregorianToS454(h.date.getFullYear(),h.date.getMonth()+1,h.date.getDate());
        if(s.year===s454Year) holidays.push({month:s.month,day:s.day,name:h.name});
    });
    return holidays;
}

/** APP STATE */
const state = {
    viewYear: 2026, viewMonth: 7, selectedDay: null,
    events: JSON.parse(localStorage.getItem('sym454_events')||'{}'), modalType:'event'
};

const els = {
    grid:document.getElementById('days-grid'), title:document.getElementById('cal-title'),
    markBtn:document.getElementById('mark-day-btn'), modal:document.getElementById('event-modal'),
    eventName:document.getElementById('event-name'), typeBtns:document.querySelectorAll('.type-btn'),
    navBtns:document.querySelectorAll('.nav-btn'), pages:document.querySelectorAll('.page'),
    gregInput:document.getElementById('greg-input'), symResult:document.getElementById('sym-result'),
    symInput:document.getElementById('sym-input'), gregResult:document.getElementById('greg-result')
};

const MONTH_NAMES=["","January","February","March","April","May","June","July","August","September","October","November","December"];
function saveEvents(){localStorage.setItem('sym454_events',JSON.stringify(state.events));}
function getKey(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

function renderCalendar() {
    els.title.textContent=`${MONTH_NAMES[state.viewMonth]} ${state.viewYear}`;
    els.grid.innerHTML='';
    
    // Monday=0 offset from engine
    const firstDow=S454.getDayOfWeek(state.viewYear,state.viewMonth,1);
    const daysInMonth=S454.getDaysInMonth(state.viewYear,state.viewMonth);
    const holidays=getVancouverHolidays(state.viewYear);
    
    for(let i=0;i<firstDow;i++){
        const empty=document.createElement('div');
        empty.className='day-cell empty';
        els.grid.appendChild(empty);
    }

    for(let d=1;d<=daysInMonth;d++){
        const cell=document.createElement('div');
        cell.className='day-cell';
        if(state.selectedDay===d) cell.classList.add('selected');
        if(state.viewYear===2026&&state.viewMonth===7&&d===15) cell.classList.add('today');

        const num=document.createElement('div');
        num.className='day-num'; num.textContent=d;
        cell.appendChild(num);

        // TEXT EVENTS INSIDE BOX
        const key=getKey(state.viewYear,state.viewMonth,d);
        const dayEvents=state.events[key]||[];
        const hol=holidays.filter(h=>h.day===d);
        
        if(dayEvents.length>0||hol.length>0){
            const list=document.createElement('div');
            list.className='event-list';
            hol.forEach(h=>{
                const t=document.createElement('div');
                t.className='event-text holiday'; t.textContent=h.name;
                list.appendChild(t);
            });
            dayEvents.forEach(e=>{
                const t=document.createElement('div');
                t.className=`event-text ${e.type}`; t.textContent=e.name;
                list.appendChild(t);
            });
            cell.appendChild(list);
        }

        // Tap to select, tap again to DESELECT
        cell.addEventListener('click',()=>{
            state.selectedDay = state.selectedDay===d ? null : d;
            els.markBtn.classList.toggle('hidden', state.selectedDay===null);
            renderCalendar();
        });
        els.grid.appendChild(cell);
    }
}

// Month Nav
document.getElementById('prev-month').addEventListener('click',()=>{
    state.viewMonth--; if(state.viewMonth<1){state.viewMonth=12;state.viewYear--;}
    state.selectedDay=null; els.markBtn.classList.add('hidden'); renderCalendar();
});
document.getElementById('next-month').addEventListener('click',()=>{
    state.viewMonth++; if(state.viewMonth>12){state.viewMonth=1;state.viewYear++;}
    state.selectedDay=null; els.markBtn.classList.add('hidden'); renderCalendar();
});

// Tabs
els.navBtns.forEach(btn=>btn.addEventListener('click',()=>{
    els.navBtns.forEach(b=>b.classList.remove('active'));
    els.pages.forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`page-${btn.dataset.page}`).classList.add('active');
}));

// Modal
els.markBtn.addEventListener('click',()=>{els.modal.classList.add('open');els.eventName.value='';els.eventName.focus();});
document.getElementById('modal-cancel').addEventListener('click',()=>els.modal.classList.remove('open'));
els.typeBtns.forEach(btn=>btn.addEventListener('click',()=>{
    els.typeBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); state.modalType=btn.dataset.type;
}));
document.getElementById('modal-save').addEventListener('click',()=>{
    const name=els.eventName.value.trim(); if(!name)return;
    const key=getKey(state.viewYear,state.viewMonth,state.selectedDay);
    if(!state.events[key])state.events[key]=[];
    state.events[key].push({type:state.modalType,name});
    saveEvents(); els.modal.classList.remove('open'); renderCalendar();
});

// Converter
els.gregInput.addEventListener('change',()=>{
    const v=els.gregInput.value; if(!v)return;
    const[y,m,d]=v.split('-').map(Number);
    const s=S454.gregorianToS454(y,m,d);
    els.symResult.textContent=`${MONTH_NAMES[s.month]} ${s.day}, ${s.year}`;
});
els.symInput.addEventListener('input',()=>{
    const m=els.symInput.value.trim().match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if(!m){els.gregResult.textContent='—';return;}
    try{const g=S454.s454ToGregorian(...m.slice(1).map(Number));
    els.gregResult.textContent=`${g.year}-${String(g.month).padStart(2,'0')}-${String(g.day).padStart(2,'0')}`;}
    catch{els.gregResult.textContent='Invalid';}
});

// Init
els.gregInput.valueAsDate=new Date();
els.gregInput.dispatchEvent(new Event('change'));
renderCalendar();
</script>
</body>
</html>
