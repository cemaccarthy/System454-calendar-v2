/**
 * SYMMETRY454 ENGINE
 */
const S454 = (() => {
    const ANCHOR_GREG = new Date(2026, 6, 15);
    const ANCHOR_S454 = { year: 2026, month: 7, day: 15 };
    
    function isLeap(year) { return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0); }
    function getWeeksInMonth(year, month) {
        const pattern = [4, 5, 4];
        let weeks = pattern[((month - 1) % 3)];
        if (month === 12 && isLeap(year)) weeks += 1;
        return weeks;
    }
    function getDaysInMonth(year, month) { return getWeeksInMonth(year, month) * 7; }
    function getDaysInYear(year) { return isLeap(year) ? 371 : 364; }
    
    function s454ToDayCount(y, m, d) {
        let days = 0;
        for (let yr = 1; yr < y; yr++) days += getDaysInYear(yr);
        for (let mo = 1; mo < m; mo++) days += getDaysInMonth(y, mo);
        return days + d - 1;
    }
    
    function gregToDayCount(date) {
        const start = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const epoch = new Date(Date.UTC(1, 0, 1));
        return Math.floor((start - epoch) / 86400000);
    }
    
    const anchorSDays = s454ToDayCount(ANCHOR_S454.year, ANCHOR_S454.month, ANCHOR_S454.day);
    const anchorGDays = gregToDayCount(ANCHOR_GREG);
    const OFFSET = anchorGDays - anchorSDays;

    function s454ToGregorian(y, m, d) {
        const gDays = s454ToDayCount(y, m, d) + OFFSET;
        const epoch = new Date(Date.UTC(1, 0, 1));
        const result = new Date(epoch.getTime() + gDays * 86400000);
        return { year: result.getUTCFullYear(), month: result.getUTCMonth() + 1, day: result.getUTCDate() };
    }

    function gregorianToS454(gYear, gMonth, gDay) {
        const gDate = new Date(Date.UTC(gYear, gMonth - 1, gDay));
        const sDays = gregToDayCount(gDate) - OFFSET;
        let y = 1, remaining = sDays;
        while (true) { const dy = getDaysInYear(y); if (remaining < dy) break; remaining -= dy; y++; }
        let m = 1;
        while (true) { const dm = getDaysInMonth(y, m); if (remaining < dm) break; remaining -= dm; m++; }
        return { year: y, month: m, day: remaining + 1 };
    }

    // Monday = 0 offset
    function getDayOfWeek(y, m, d) {
        const totalDays = s454ToDayCount(y, m, d);
        return totalDays % 7; 
    }

    return { getDaysInMonth, getDayOfWeek, s454ToGregorian, gregorianToS454, isLeap };
})();

const S454 = (() => {
    const ANCHOR_GREG = new Date(2026, 6, 15);
    const ANCHOR_S454 = { year: 2026, month: 7, day: 15 };
    
    function isLeap(year) { return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0); }
    function getWeeksInMonth(year, month) {
        const pattern = [4, 5, 4];
        let weeks = pattern[((month - 1) % 3)];
        if (month === 12 && isLeap(year)) weeks += 1;
        return weeks;
    }
    function getDaysInMonth(year, month) { return getWeeksInMonth(year, month) * 7; }
    function getDaysInYear(year) { return isLeap(year) ? 371 : 364; }
    
    function s454ToDayCount(y, m, d) {
        let days = 0;
        for (let yr = 1; yr < y; yr++) days += getDaysInYear(yr);
        for (let mo = 1; mo < m; mo++) days += getDaysInMonth(y, mo);
        return days + d - 1;
    }
    
    function gregToDayCount(date) {
        const start = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const epoch = new Date(Date.UTC(1, 0, 1));
        return Math.floor((start - epoch) / 86400000);
    }
    
    const anchorSDays = s454ToDayCount(ANCHOR_S454.year, ANCHOR_S454.month, ANCHOR_S454.day);
    const anchorGDays = gregToDayCount(ANCHOR_GREG);
    const OFFSET = anchorGDays - anchorSDays;

    function s454ToGregorian(y, m, d) {
        const gDays = s454ToDayCount(y, m, d) + OFFSET;
        const epoch = new Date(Date.UTC(1, 0, 1));
        const result = new Date(epoch.getTime() + gDays * 86400000);
        return { year: result.getUTCFullYear(), month: result symInput:document.getElementById('sym-input.getUTCMonth() + 1, day: result.getUTCDate() };
    }

    function gregorianToS454(gYear, gMonth, gDay) {
        const gDate = new Date(Date.UTC(gYear, gMonth - 1, gDay));
        const sDays = gregToDayCount(gDate) - OFFSET;
        let y = 1, remaining = sDays;
        while (true) { const dy = getDaysInYear(y); if (remaining < dy) break; remaining -= dy; y++; }
        let m = 1;
        while (true) { const dm = getDaysInMonth(y, m); if (remaining < dm) break; remaining -= dm; m++; }
        return { year: y, month: m, day: remaining + 1 };
    }

    function getDayOfWeek(y, m, d) {
        const totalDays = s454ToDayCount(y, m, d);
        return totalDays % 7;
